<!-- Mark point -->
<div class="absolute w-4 h-4 md:w-6 md:h-6 left-0 transform -translate-x-1/2 rounded-full bg-blue-500"></div>

<!-- Card -->
<div class="ml-6 p-4 space-y-2 bg-white rounded-lg shadow-sm border border-gray-200">

  <!-- Date + Icon -->
  <div class="flex items-center justify-between">

    <!-- Date -->
    <h2 class="font-lightline uppercase tracking-wide text-xs text-gray-500">
      {{ event().date | date:'medium' }}
    </h2>

    <!-- Icono -->
    <div class="text-gray-400">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-3.5 h-3.5 opacity-60" fill="none" viewBox="0 0 24 24"
        stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M7 8h10M7 12h10M7 16h6M5 4h14a2 2 0 012 2v12a2 2 0 01-2 2H5a2 2 0 01-2-2V6a2 2 0 012-2z" />
      </svg>
    </div>

  </div>
  <!-- Title -->
  <h1 class="font-lightline text-lg font-semibold">{{ event().title }}</h1>

  <!-- Description -->
  <p class="font-lightline text-sm text-gray-600 leading-relaxed">{{ event().description }}
  </p>

  <!-- Source and more details  -->
  @if(event().source){
  <div class="font-lightline text-base md:text-lg text-gray-500 mt-4">
    <span>Fuente(s): {{ event().source }}</span>
  </div>
  }
</div>
