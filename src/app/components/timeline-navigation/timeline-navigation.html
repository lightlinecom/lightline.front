<div id="dates" class="space-y-5">

  <!-- Resumen -->
  <div class="p-4 space-y-2 xl:space-y-4 bg-white dark:bg-gray-900 rounded-lg shadow-sm border border-gray-200 dark:border-gray-800">
    <h4 class="font-lightline font-semibold text-sm xl:text-base text-gray-900 dark:text-gray-100">
      Resumen
    </h4>
    <p class="font-lightline text-sm xl:text-base text-gray-600 dark:text-gray-400">
      Caso judicial por difamación entre Johnny Depp y Amber Heard.
    </p>
  </div>

  <!-- Navegación -->
  <div class="p-4 bg-white dark:bg-gray-900 rounded-lg shadow-sm border border-gray-200 dark:border-gray-800">
    <ul class="font-lightline text-gray-500 dark:text-gray-400 text-sm xl:text-base space-y-4 pr-24">

      <li>
        <button (click)="toggleYear(2026)"
          class="cursor-pointer flex items-center justify-between w-full hover:text-gray-800 dark:hover:text-white transition">
          <span>2026</span>
        </button>

        <ul class="overflow-hidden transition-all duration-300 mt-2 ml-4 space-y-2">
          <li class="cursor-pointer hover:text-gray-800 dark:hover:text-white">Marzo (4)</li>
          <li class="cursor-pointer hover:text-gray-800 dark:hover:text-white">Febrero (2)</li>
        </ul>
      </li>

      <!-- repite igual -->

    </ul>
  </div>
</div>
