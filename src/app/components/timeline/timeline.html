<!-- Live mode -->
<div class="sticky left-0 top-0 z-10 h-10 px-4 flex items-center justify-between bg-red-600
  md:h-20">

  <div class="flex items-center gap-3 text-white">

    <!-- Pulse -->
    <span class="relative flex h-2 w-2 md:h-4 md:w-4">
      <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-white opacity-75"></span>
      <span class="relative inline-flex rounded-full h-2 w-2 md:h-4 md:w-4 bg-white"></span>
    </span>

    <!-- Live -->
    <div class="flex items-center gap-2">
      <span class="font-lightline font-semibold uppercase tracking-wide md:text-lg">
        En vivo
      </span>

      <span class="font-lightline opacity-80 text-sm md:text-lg">
        · Actualizado ahora
      </span>
    </div>

  </div>

  <!-- Recent -->
  <button class="font-lightline text-sm md:text-lg text-white/90 hover:text-white transition flex items-center gap-1">
    Ir a lo más reciente
    <span class="text-base">↓</span>
  </button>

</div>

<div class="p-4">
  <ul class="relative space-y-10">

    <!-- Vertical line -->
    <!-- <div class="absolute w-1 bg-linear-to-b from-blue-500 to-red-600 h-full left-0 transform -translate-x-1/2"></div> -->
    <div class="absolute w-1 bg-blue-500 h-full left-0 transform -translate-x-1/2"></div>

    <!-- Items -->
    @for(event of events(); track event.id){
    <li>
      <app-timeline-item [event]="event" />
    </li>
    }
  </ul>
</div>
